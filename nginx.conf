server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown route returns index.html so Vue Router handles it
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Avoid caching the HTML entry
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
