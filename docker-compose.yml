services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-TicketAI — Mesa de Ayuda Inteligente}
    container_name: ticketai-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
